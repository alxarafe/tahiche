server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Static assets that live in the project root (not in public/)
    # Core/Assets, node_modules, Plugins, Dinamic (cached assets)
    location ~ ^/(Core|node_modules|Plugins|Dinamic|var)/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.php?$query_string;
    }

    # Favicon shortcut
    location = /favicon.ico {
        root /var/www/html;
        try_files /Core/Assets/Images/favicon.ico =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets within public/
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass tahiche_php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
